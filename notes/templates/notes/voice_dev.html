<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.5, maximum-scale=2.0">
    <title>Reconnaissance Vocale - Magic Leap 2</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #121212;
        /* Fond sombre pour l'AR (les noirs deviennent transparents) */
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
      }

      .container {
        background: rgba(30, 30, 30, 0.9);
        padding: 2rem;
        border-radius: 15px;
        width: 80%;
        max-width: 800px;
        text-align: center;
        border: 1px solid #444;
      }

      /* Boutons larges pour faciliter le ciblage avec le rayon du contrôleur ML2 */
      button {
        padding: 20px 40px;
        font-size: 1.5rem;
        border-radius: 10px;
        border: none;
        background-color: #6200ea;
        color: white;
        cursor: pointer;
        margin: 20px 0;
        transition: background-color 0.3s;
      }

      button:hover {
        background-color: #7c4dff;
      }

      button.listening {
        background-color: #b00020;
      }

      #status {
        font-size: 1.2rem;
        color: #03dac6;
        margin-bottom: 10px;
      }

      #output {
        margin-top: 20px;
        padding: 20px;
        background: #000;
        min-height: 150px;
        border-radius: 10px;
        font-size: 1.5rem;
        text-align: left;
        border: 1px solid #333;
      }

      .interim {
        color: #aaaaaa;
        font-style: italic;
      }

      .error {
        color: #cf6679;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Reconnaissance Vocale AR</h2>
      <div id="status">Statut : Prêt</div>
      <button id="btn-toggle">Activer le Micro</button>
      <div id="output">Appuyez sur le bouton avec votre contrôleur et parlez...</div>
    </div>
    <script>
      const statusEl = document.getElementById('status');
      const outputEl = document.getElementById('output');
      const btnToggle = document.getElementById('btn-toggle');

      // Initialisation
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        statusEl.innerHTML = "<span class='error'>API Web Speech non supportée sur ce navigateur.</span>";
        btnToggle.style.display = 'none';
      } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'fr-FR';
        recognition.continuous = true;
        recognition.interimResults = true;

        let isListening = false;

        btnToggle.addEventListener('click', () => {
          if (isListening) {
            recognition.stop();
          } else {
            try {
              recognition.start();
            } catch (e) {
              console.error(e);
            }
          }
        });

        recognition.onstart = () => {
          isListening = true;
          statusEl.innerText = "Statut : Écoute en cours (Parlez maintenant)";
          btnToggle.innerText = "Désactiver le Micro";
          btnToggle.classList.add('listening');
        };

        recognition.onresult = (event) => {
          let final = '';
          let interim = '';

          for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
              final += event.results[i][0].transcript + ' ';
            } else {
              interim += event.results[i][0].transcript;
            }
          }
          outputEl.innerHTML = `<strong>${final}</strong> <span class="interim">${interim}</span>`;
        };

        recognition.onerror = (event) => {
          isListening = false;
          btnToggle.innerText = "Activer le Micro";
          btnToggle.classList.remove('listening');

          if (event.error === 'network') {
            statusEl.innerHTML = "<span class='error'>Erreur : Le ML2 nécessite une connexion internet pour traiter la voix.</span>";
          } else if (event.error === 'not-allowed') {
            statusEl.innerHTML = "<span class='error'>Erreur : Autorisation du micro refusée. Acceptez le prompt de sécurité.</span>";
          } else if (event.error === 'service-not-allowed' || event.error === 'no-speech') {
            statusEl.innerHTML = `<span class='error'>Erreur (${event.error}) : Moteur vocal AOSP manquant ou aucun son détecté.</span>`;
          } else {
            statusEl.innerHTML = `<span class='error'>Erreur : ${event.error}</span>`;
          }
        };

        recognition.onend = () => {
          if (isListening) {
            // Redémarre automatiquement si l'arrêt n'est pas volontaire
            recognition.start();
          } else {
            statusEl.innerText = "Statut : Prêt";
            btnToggle.innerText = "Activer le Micro";
            btnToggle.classList.remove('listening');
          }
        };
      }
    </script>
  </body>
</html>
