<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.5">
    <title>IA Vocale Locale - Magic Leap 2</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #121212;
        /* Noir pour transparence en AR */
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        margin: 0;
      }

      .container {
        background: rgba(30, 30, 30, 0.9.5);
        padding: 2.5rem;
        border-radius: 16px;
        width: 85%;
        max-width: 750px;
        text-align: center;
        border: 1px solid #444;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }

      h2 {
        margin-top: 0;
        color: #f0f0f0;
      }

      /* Bouton géant pour ciblage facile au contrôleur */
      button {
        padding: 24px 48px;
        font-size: 1.6rem;
        font-weight: bold;
        border-radius: 12px;
        border: none;
        background-color: #3700b3;
        color: white;
        cursor: pointer;
        margin: 20px 0;
        width: 100%;
        transition: all 0.2s ease;
      }

      button:disabled {
        background-color: #555 !important;
        color: #aaa;
        cursor: not-allowed;
      }

      button.recording {
        background-color: #cf6679;
        animation: pulse 1.5s infinite;
      }

      #status {
        font-size: 1.2rem;
        color: #03dac6;
        margin-bottom: 15px;
        min-height: 1.5rem;
      }

      #output {
        margin-top: 20px;
        padding: 25px;
        background: #000000;
        min-height: 120px;
        border-radius: 10px;
        font-size: 1.6rem;
        text-align: left;
        border: 1px solid #333;
        line-height: 1.4;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }

        50% {
          opacity: 0.7;
        }

        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>IA Vocale 100% Locale</h2>
      <div id="status">Initialisation de l'environnement informatique...</div>
      <button id="btn-action" disabled>Veuillez patienter...</button>
      <div id="output">Le texte transcrit s'affichera ici après l'enregistrement.</div>
    </div>
    <script type="module">
      import {
        pipeline,
        env
      } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

      // Optimisation : Empêcher la recherche de fichiers locaux, forcer le CDN au premier téléchargement
      env.allowLocalModels = false;

      const statusEl = document.getElementById('status');
      const btnAction = document.getElementById('btn-action');
      const outputEl = document.getElementById('output');

      let transcriber = null;
      let mediaRecorder = null;
      let audioChunks = [];
      let isRecording = false;

      // 1. Initialisation et téléchargement transparent du modèle Whisper AI
      async function initAI() {
        try {
          statusEl.innerText = "Téléchargement du modèle IA (75 Mo - Patientez)...";

          transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', {
            progress_callback: (data) => {
              if (data.status === 'progress') {
                statusEl.innerText = `Téléchargement : ${Math.round(data.progress)}%`;
              }
            }
          });

          statusEl.innerText = "Modèle prêt et stocké localement !";
          btnAction.innerText = "Démarrer l'enregistrement";
          btnAction.disabled = false;
        } catch (error) {
          console.error(error);
          statusEl.innerText = "Erreur critique lors du chargement de l'IA.";
          outputEl.innerText = error.message;
        }
      }

      // 2. Gestion de l'action du bouton (Démarrer / Arrêter)
      btnAction.addEventListener('click', async () => {
        if (!isRecording) {
          startRecording();
        } else {
          stopRecording();
        }
      });

      async function startRecording() {
        audioChunks = [];
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true
          });
          mediaRecorder = new MediaRecorder(stream);

          mediaRecorder.ondataavailable = event => {
            if (event.data.size > 0) audioChunks.push(event.data);
          };

          mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, {
              type: mediaRecorder.mimeType
            });
            processAndTranscribe(audioBlob);
          };

          mediaRecorder.start();
          isRecording = true;
          btnAction.innerText = "Arrêter et Transcrire";
          btnAction.classList.add('recording');
          statusEl.innerText = "Écoute en cours... Parlez puis cliquez à nouveau.";
        } catch (err) {
          statusEl.innerText = "Accès microphone refusé.";
          console.error(err);
        }
      }

      function stopRecording() {
        if (mediaRecorder && isRecording) {
          mediaRecorder.stop();
          // Coupe les pistes du micro pour relâcher le matériel
          mediaRecorder.stream.getTracks().forEach(track => track.stop());
          isRecording = false;
          btnAction.innerText = "Calcul de la transcription...";
          btnAction.classList.remove('recording');
          btnAction.disabled = true;
          statusEl.innerText = "L'IA analyse votre voix en local...";
        }
      }

      // 3. Resampling audio natif à 16kHz et exécution de la prédiction IA
      async function processAndTranscribe(blob) {
        try {
          const audioContext = new(window.AudioContext || window.webkitAudioContext)();
          const arrayBuffer = await blob.arrayBuffer();
          const originalBuffer = await audioContext.decodeAudioData(arrayBuffer);

          // Whisper exige obligatoirement du 16000Hz mono. On rééchantillonne à la volée.
          const offlineCtx = new OfflineAudioContext(1, originalBuffer.duration * 16000, 16000);
          const source = offlineCtx.createBufferSource();
          source.buffer = originalBuffer;
          source.connect(offlineCtx.destination);
          source.start();

          const resampledBuffer = await offlineCtx.startRendering();
          const audioData32 = resampledBuffer.getChannelData(0); // Float32Array final

          // Exécution du modèle Whisper
          const response = await transcriber(audioData32, {
            language: 'french',
            task: 'transcribe'
          });

          outputEl.innerHTML = `<strong>Résultat :</strong> <br>${response.text}`;
        } catch (error) {
          console.error(error);
          outputEl.innerText = "Erreur d'analyse : " + error.message;
        } finally {
          btnAction.disabled = false;
          btnAction.innerText = "Démarrer l'enregistrement";
          statusEl.innerText = "Prêt";
        }
      }

      // Lancement automatique au chargement de la page
      initAI();
    </script>
  </body>
</html>
